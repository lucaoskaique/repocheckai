name: Deploy Repo Doctor site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "site-vite/**"
      - "site/assets/**"
      - "site/robots.txt"
      - "site/sitemap.xml"
      - "vite.config.js"
      - "vite-plugin-html-partials.js"
      - ".github/workflows/static.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ github-pagesment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site with Vite
        run: npm run build:site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact (site/)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
